<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" width="100%" height="100%">
  <!-- Background -->
  <rect width="500" height="700" fill="#f1f5f9" rx="16"/>

  <!-- Illustration Group -->
  <g transform="translate(10, -10)">
    <!-- Soft shadow/glow underneath -->
    <ellipse cx="240" cy="460" rx="130" ry="25" fill="#cbd5e1" opacity="0.4" filter="blur(8px)"/>

    <!-- Syringe (lying diagonally at the bottom) -->
    <g transform="translate(230, 420) rotate(-12)" fill="none" stroke="#64748b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <!-- Needle -->
      <line x1="-120" y1="0" x2="-60" y2="0" stroke="#94a3b8" stroke-width="3"/>
      <!-- Barrel body -->
      <rect x="-60" y="-18" width="160" height="36" rx="4" fill="#ffffff" fill-opacity="0.9" stroke="#475569" stroke-width="7"/>
      <!-- Measurement ticks -->
      <line x1="-40" y1="-10" x2="-40" y2="0" stroke="#94a3b8" stroke-width="4"/>
      <line x1="-20" y1="-10" x2="-20" y2="0" stroke="#94a3b8" stroke-width="4"/>
      <line x1="0" y1="-10" x2="0" y2="0" stroke="#94a3b8" stroke-width="4"/>
      <line x1="20" y1="-10" x2="20" y2="0" stroke="#94a3b8" stroke-width="4"/>
      <line x1="40" y1="-10" x2="40" y2="0" stroke="#94a3b8" stroke-width="4"/>
      <line x1="60" y1="-10" x2="60" y2="0" stroke="#94a3b8" stroke-width="4"/>
      <!-- Plunger shaft -->
      <line x1="100" y1="0" x2="150" y2="0" stroke="#475569" stroke-width="8"/>
      <line x1="150" y1="-18" x2="150" y2="18" stroke="#475569" stroke-width="8"/>
      <!-- Plunger tip inside -->
      <rect x="75" y="-14" width="20" height="28" fill="#3b82f6" stroke="none"/>
    </g>

    <!-- Medicine Bottle (Primary vertical element) -->
    <g transform="translate(140, 180)">
      <!-- Main Glass Bottle Body -->
      <rect x="0" y="50" width="150" height="200" rx="20" fill="#3b82f6" fill-opacity="0.8" stroke="#2563eb" stroke-width="8"/>
      <!-- Bottle neck -->
      <rect x="45" y="15" width="60" height="35" fill="#3b82f6" fill-opacity="0.8" stroke="#2563eb" stroke-width="8"/>
      <!-- Screw Cap -->
      <rect x="35" y="-5" width="80" height="24" rx="6" fill="#60a5fa" stroke="#2563eb" stroke-width="6"/>
      <!-- Highlights on glass -->
      <path d="M 25 80 L 25 220" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
      <path d="M 45 80 L 45 130" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
      
      <!-- Label on the bottle -->
      <rect x="10" y="100" width="130" height="110" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
      <!-- Medical cross icon on label -->
      <rect x="53" y="125" width="24" height="24" rx="4" fill="#eff6ff"/>
      <path d="M 65 131 L 65 143 M 59 137 L 71 137" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
      <!-- Text lines placeholder on label -->
      <line x1="25" y1="170" x2="125" y2="170" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
      <line x1="25" y1="185" x2="105" y2="185" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- Capsule & Pills Group (lying on the right) -->
    <g transform="translate(290, 310)">
      <!-- Standing tablet -->
      <circle cx="20" cy="50" r="32" fill="#93c5fd" stroke="#2563eb" stroke-width="6"/>
      <line x1="-2" y1="50" x2="42" y2="50" stroke="#2563eb" stroke-width="5" stroke-linecap="round" transform="rotate(-30 20 50)"/>
      <circle cx="20" cy="50" r="32" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>

      <!-- Capsule -->
      <g transform="translate(40, 70) rotate(45)">
        <!-- Capsule bottom half (blue) -->
        <path d="M -18 -40 L 18 -40 L 18 0 A 18 18 0 0 1 -18 0 Z" fill="#3b82f6" stroke="#2563eb" stroke-width="6" stroke-linejoin="round"/>
        <!-- Capsule top half (white) -->
        <path d="M -18 -40 A 18 18 0 0 1 18 -40 L 18 -80 A 18 18 0 0 0 -18 -80 Z" fill="#ffffff" stroke="#2563eb" stroke-width="6" stroke-linejoin="round"/>
        <!-- Capsule shine -->
        <path d="M -8 -70 L -8 -10" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
      </g>
    </g>
  </g>

  <!-- Dynamic Branding Text -->
  <text x="250" y="610" font-family="'DM Sans', 'Inter', sans-serif" font-size="28" font-weight="700" fill="#0f172a" text-anchor="middle">
    www.medrawpharma.com
  </text>
  <text x="250" y="640" font-family="'DM Sans', 'Inter', sans-serif" font-size="16" font-weight="500" fill="#64748b" text-anchor="middle">
    MedRaw Pharmaceuticals &amp; Supplier
  </text>
</svg>
